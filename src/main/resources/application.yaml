server:
  port: 8081

spring:
  application:
    name: nexa-auth
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/nexa_auth?createDatabaseIfNotExist=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

jwt:
  expiration: ${JWT_EXPIRATION:2592000000} # 30 dias
  key: ${JWT_KEY:4e5f8a9c2d1b7f6a3c8e9d0f1a2b3c4d5e6f7a8b9c0d1e2f}
  #access-token-expiration: 900000      # 15 min
  #refresh-token-expiration: 2592000000 # 30 dias
